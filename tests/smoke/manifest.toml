description = "Pins fix-wg-add: the `d` (day) timeout unit must be accepted on BOTH the add-time validator (graph::parse_delay) and the spawn-path parser (parse_timeout_secs in src/commands/spawn/mod.rs). Pre-fix `wg add --timeout 1d` was accepted but the dispatcher/spawn path rejected `1d` with 'Invalid task timeout value' (the spawn parser only knew s/m/h), so the task never spawned and users had to rewrite `1d` -> `24h`. Asserts (1) `wg add --timeout 1d` is accepted; (2) `wg spawn --executor shell --timeout 1d` spawns without an 'Invalid' error (CLI-flag path, execution.rs:534); (3) a task created with `--timeout 1d` spawns without 'Invalid task timeout value' (stored-timeout path, execution.rs:540). Credential-free: uses the no-LLM `shell` executor running `echo hi`; no daemon or network needed."
timeout_seconds = 30

[[scenario]]
name = "pi_plugin_install_hermetic"
script = "scenarios/pi_plugin_install_hermetic.sh"
