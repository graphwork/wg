description = "Pins the recurring-wakeup DIAGNOSTICS surface (impl-recurring-heartbeat-diagnostics). `wg cron` lists every cron-enabled task with schedule, resolved weekday + UTC time-of-day (naming the cron crate's non-standard 1=Sunday mapping so a Monday-intent `1` shows as Sunday), next/last fire, due/overdue/paused state, and the missed-fire count across daemon downtime. `wg list` renders the resolved weekday inside the [cron: …] tag (wrong-day bug visible at list time, no per-row spam). `wg show <cron-task>` prints a 'Recurring (cron):' block with schedule, resolved summary, next/last fire, DUE/OVERDUE/paused state, and missed-fire count. `wg status` prints exactly one compact 'Recurring (cron):' summary (count, due/overdue/paused, soonest next-fire). `wg heartbeat <non-agent-id>` rejects the external-trigger attempt with a diagnostic pointing at the safe path (`wg heartbeat agent-N`, `wg cron`) so a host cron does not silently fight the dispatcher. Credential-free: pure graph-state + CLI output; no worker spawn."
timeout_seconds = 90

