description = "Pins prod-verify (the closing production-readiness gate): closes the lib-vs-bin CI blind spot. CI runs only `cargo test --lib` / `--doc` / `--test integration_*` and NEVER compiles the `wg` binary crate's `#[cfg(test)]` modules, so a broken bin unit test ships GREEN. prod-verify found exactly this: the M18/wire-review split-trust work grew `peer::run_add` a 7th `trust: Option<&str>` param but left all seven `#[cfg(test)]` callers in src/commands/peer.rs at 6 args — invisible to every CI gate. This scenario compiles the binary test target (`cargo test --bin wg --no-run`) and FAILS if it does not build, so any future signature change that breaks a bin `#[cfg(test)]` caller is caught at the smoke gate instead of rotting undetected. Loud SKIP (77) when cargo/the workspace manifest is unavailable."
