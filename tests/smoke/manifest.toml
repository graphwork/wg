description = "Pins paused/waiting state interaction with recurring cron triggers (repro-weekly-wakeup-heartbeat). A cron task that is DUE (next_cron_fire in the past) must still respect task-state gates: a PAUSED cron task is NOT ready (ready_tasks_with_peers_cycle_aware filters task.paused before is_time_ready), and a Waiting-status cron task is NOT ready (the Open|Incomplete status filter holds). An operator who pauses a weekly cron for a maintenance window will NOT have it auto-dispatched at fire time. Credential-free: pure graph-state + `wg ready`."
