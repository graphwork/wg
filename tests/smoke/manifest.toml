description = "Pins bug-tui-focus-fix (docs/bugs/tui-focus-input-race.md): returning OS focus to the wg TUI must never leave a window in which the user's first keystroke leaks to tmux (popping choose-tree). Drives the REAL `wg tui` under a PTY and asserts both halves of the general, emulator-agnostic fix in the raw output stream: (1) startup enables DECSET 1004 focus reporting (\\x1b[?1004h) so tmux forwards focus-in into the pane — absent on pre-fix main, which has no EnableFocusChange; (2) on receiving a focus-in report (\\x1b[I) wg re-asserts its own input grab as one burst — bracketed paste (\\x1b[?2004h) + mouse capture (\\x1b[?1002h) — before the next key, where pre-fix main drops Event::FocusGained via a catch-all and re-asserts nothing. Idle ratatui repaints never emit DECSET mode-sets, so the post-focus-in \\x1b[?2004h is an unambiguous re-assert signal. Fails on main, passes after the fix; credential-free, no tmux/daemon required."
timeout_seconds = 60

