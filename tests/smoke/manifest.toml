]
description = "Pins implement-pi-plugin: the `ensure-pi-plugin` install primitive + hermetic `pi -e <cache>/dist/index.js -ne` load. Credential-free core (pure `wg` binary): `wg pi-plugin compat-version` prints the embedded version; `wg pi-plugin install` (WG_PI_PLUGIN_FORCE_CACHE=1, isolated HOME/XDG_CACHE_HOME) materializes the embedded bundle into ${XDG_CACHE_HOME}/wg/pi-plugin/<compat>/ with a `.wg-ok` integrity stamp and writes the ~/.pi/agent/settings.json extensions entry; a second install is byte-identical (idempotent); a corrupted cache (truncated index.js + missing .wg-ok) is detected as not-ready and self-healed by re-materializing the embedded truth. Live (only when a `pi` binary is present, still credential-free because the extension loads at pi startup before any model connection): a MISMATCHED WG_PI_PLUGIN_COMPAT_VERSION makes real `pi --mode rpc -e <cache dist> -ne` fail LOUDLY with a compat-mismatch error naming the found wg version (the loud-fail tripwire), while a MATCHING version loads with no 'Failed to load extension' error. SKIPs the live sub-check (not the scenario) when no `pi` binary is on PATH."
timeout_seconds = 60
