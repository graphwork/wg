description = "Pi Coding Agent: GLM 5.2 workers/chat via OpenRouter, DeepSeek Chat for agency/meta checks"

# Pi routes for worker/chat roles. The default and task-agent route use GLM 5.2
# through Pi's OpenRouter provider:
#
#   pi:openrouter/z-ai/glm-5.2
#
# The agency/meta roles below are intentionally explicit OpenRouter routes, not
# `pi:` routes. They are short one-shot checks (assign/evaluate/flip/triage/etc.)
# and do not need Pi's interactive handler; the native OpenRouter path is faster
# and cheaper for this traffic.

[agent]
model = "pi:openrouter/z-ai/glm-5.2"

[dispatcher]
model = "pi:openrouter/z-ai/glm-5.2"
max_agents = 8

[tiers]
fast = "openrouter:deepseek/deepseek-chat"
standard = "pi:openrouter/z-ai/glm-5.2"
premium = "pi:openrouter/z-ai/glm-5.2"

[models.default]
model = "pi:openrouter/z-ai/glm-5.2"

[models.task_agent]
model = "pi:openrouter/z-ai/glm-5.2"

# Agency/meta one-shot roles. Explicit per-role overrides win over the default
# claude:haiku agency pin, so these route through the native OpenRouter handler.
[models.evaluator]
model = "openrouter:deepseek/deepseek-chat"

[models.assigner]
model = "openrouter:deepseek/deepseek-chat"

[models.flip_inference]
model = "openrouter:deepseek/deepseek-chat"

[models.flip_comparison]
model = "openrouter:deepseek/deepseek-chat"

[models.verification]
model = "openrouter:deepseek/deepseek-chat"

[models.triage]
model = "openrouter:deepseek/deepseek-chat"

[models.placer]
model = "openrouter:deepseek/deepseek-chat"

[models.creator]
model = "openrouter:deepseek/deepseek-chat"

[models.evolver]
model = "openrouter:deepseek/deepseek-chat"

[models.compactor]
model = "openrouter:deepseek/deepseek-chat"

[models.chat_compactor]
model = "openrouter:deepseek/deepseek-chat"

# ─────────────────────────────────────────────────────────────────────────────
# PLUGIN INSTALL / PLACEMENT (wg-pi-plugin)
# ─────────────────────────────────────────────────────────────────────────────
# Routing a `pi:` model spec to the pi handler is only half the integration:
# pi gains its WG tools (`wg_ready`/`wg_show`/`wg_add`/`wg_done`/… and the `/wg`
# command) from the `@worksgood/wg-pi-plugin` extension, which must be present in
# the pi process WG spawns. There are three placement options (see
# docs/pi-integration/integration-plan-v2.md §2.1 + §4):
#
# 1. GLOBAL extensions dir (Topology A — recommended, ship-first):
#      ~/.pi/agent/extensions/
#    Drop (or symlink) the built plugin bundle here and pi auto-loads it for
#    every session. Global placement SIDESTEPS pi's project trust gate — no
#    per-repo prompt — which is what we want for unattended WG-spawned workers.
#    Equivalent ad-hoc forms: `pi -e <plugin>` on the spawn command line, or a
#    `packages` entry in pi settings.
#
# 2. PROJECT extensions dir (per-repo, trust-gated):
#      <repo>/.pi/extensions
#    Pi only loads project-local extensions when the project is trusted
#    (`project_trust`). Use this when you want the plugin version-locked to a
#    checkout, but note the trust gate must be satisfied first or the plugin is
#    silently skipped — avoid for headless workers that cannot answer a prompt.
#
# 3. NODE-HOST BUNDLE (Topology B — default for unattended workers/chat):
#    WG spawns `node wg-pi-host.mjs` instead of the `pi` binary; the host loads
#    the plugin in-process as a JS object via
#      DefaultResourceLoader({ extensionFactories: [wgPlugin], eventBus })
#    so there is no extensions-dir lookup and no terminal at all. This is the
#    deterministic-version path (the bundle ships alongside the wg binary at
#    pi-plugin/) and the clean event-bus ↔ WG-IPC bridge. Discovery accepts a
#    `pi:` route satisfied by EITHER a `pi` binary (Topology A/C) OR Node +
#    wg-pi-host + the plugin bundle (Topology B); see src/executor_discovery.rs.
#
# Topology C (attended front-end: a human runs `pi` directly and it drives WG)
# relies on the SAME global auto-discovered plugin from option 1.
# ─────────────────────────────────────────────────────────────────────────────
