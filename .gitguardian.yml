# GitGuardian configuration for secret detection
instance: https://dashboard.gitguardian.com

# Paths to ignore during scanning
secret:
  ignored-paths:
    - ".workgraph/"
    - "target/"
    - "*.pdf"
    - "test-workgraph/"
    - ".git/"
    - "screencast/"

  # Specific secrets to ignore (use with caution)
  ignored-matches:
    # Example for test patterns
    - name: "Test API Keys"
      match: "test_api_key_[a-zA-Z0-9]+"
    # Test email addresses in test files
    - name: "Test Email Addresses"
      match: "test@example\\.com"

  # Show secrets context in output (false for security)
  show-secrets: false

  # Maximum file size to scan (in bytes)
  max-document-size: 1048576  # 1MB

# Exit with code 1 if secrets are found
exit-zero: false

# Output in text format
output: text