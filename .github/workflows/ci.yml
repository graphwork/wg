name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy

  build:
    name: Build & Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build

      - name: cargo test (unit tests)
        run: cargo test --lib

      - name: cargo test (doc tests)
        run: cargo test --doc

  integration:
    name: Integration Tests (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo install (needed by integration tests)
        run: cargo install --path . --locked

      - name: cargo test --test integration_service
        run: cargo test --test integration_service -- --test-threads=1
        timeout-minutes: 10

  worksgood-pi:
    name: pi-worksgood build, selftest & embed staleness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build plugin + selftests
        run: |
          npm --prefix worksgood-pi ci
          npm --prefix worksgood-pi run build
          npm --prefix worksgood-pi run selftest
          node worksgood-pi/host/wg-pi-host.mjs --selftest --force-compat-mismatch
          npm --prefix worksgood-pi test

      # Anti-drift gate: re-embed from the just-built dist and fail if the
      # committed worksgood-pi/embedded/ (or generated version.ts) differs. A source
      # edit under worksgood-pi/src/** without a re-embed is
      # caught here, keeping "committed dist == fresh build" an invariant.
      - name: Embed staleness gate
        run: |
          scripts/embed-worksgood-pi.sh --no-install
          git diff --exit-code worksgood-pi/embedded worksgood-pi/src/version.ts \
            || { echo "::error::worksgood-pi/embedded is stale — run \`make embed-worksgood-pi\` and commit the result"; exit 1; }

  nightly:
    name: Build & Test (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-

      # `+nightly` overrides the channel pinned in rust-toolchain.toml so this
      # job actually exercises nightly (the toml would otherwise force stable).
      - name: cargo build
        run: cargo +nightly build

      - name: cargo test
        run: cargo +nightly test --lib
