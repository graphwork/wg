<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- WG favicon: directed task graph (fork-join diamond) -->
  <defs>
    <marker id="a" viewBox="0 0 6 6" refX="5" refY="3"
            markerWidth="3.5" markerHeight="3.5" orient="auto-start-reverse">
      <path d="M0,0.5 L5,3 L0,5.5Z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- Directed edges: A→B, A→C, B→D, C→D -->
  <line x1="13.5" y1="8.5" x2="8.5" y2="13.5"
        stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="18.5" y1="8.5" x2="23.5" y2="13.5"
        stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="8.5" y1="18.5" x2="13.5" y2="23.5"
        stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="23.5" y1="18.5" x2="18.5" y2="23.5"
        stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" marker-end="url(#a)"/>

  <!-- Task nodes -->
  <circle cx="16" cy="6" r="3.5" fill="#3fb950"/>   <!-- root: done (green) -->
  <circle cx="6" cy="16" r="3.5" fill="#3fb950"/>   <!-- left: done (green) -->
  <circle cx="26" cy="16" r="3.5" fill="#d29922"/>  <!-- right: in-progress (yellow) -->
  <circle cx="16" cy="26" r="3.5" fill="#58a6ff"/>  <!-- join: open (blue accent) -->
</svg>
